<script src="/RestAPI/docs/api.js"></script>
<script>
(function() {
  const client = new WebCTRLAPIClient();

  // -- State ------------------------------------------------------------------
  let equipmentData = [];   // [{dbid, displayPath, properties:[{enabled,expression,currentValue,newValue}]}]
  let referenceData = [];   // immutable snapshot for JSON validation
  let userExpressions = []; // normalized expression strings from Tab 1
  let isJsonView = false;

  // -- DOM references ---------------------------------------------------------
  const container = document.querySelector('.gmod-container');
  const searchTab = document.getElementById('gmodSearchTab');
  const resultsTab = document.getElementById('gmodResultsTab');
  const viewToggle = document.getElementById('gmodViewToggle');
  const tableView = document.getElementById('gmodTableView');
  const jsonView = document.getElementById('gmodJsonView');
  const jsonEditor = document.getElementById('gmodJsonEditor');
  const enableAllCb = document.getElementById('gmodEnableAll');
  const regexSelectAllCb = document.getElementById('gmodRegexSelectAll');
  const resultsControls = document.getElementById('gmodResultsControls');
  const resultsLeft = document.getElementById('gmodResultsLeft');
  const locationScopeInput = document.getElementById('gmodLocationScope');
  const filterExpressionInput = document.getElementById('gmodFilterExpression');
  const filterRegexInput = document.getElementById('gmodFilterRegex');
  const loadingOverlay = document.getElementById('gmodLoadingOverlay');

  let loadingCount = 0;

  const STORAGE_KEY = 'gmodFormState';

  // -- Helpers ----------------------------------------------------------------

  function escapeHtml(str) {
    return str
      .replace(/&/g, '&amp;')
      .replace(/</g, '&lt;')
      .replace(/>/g, '&gt;')
      .replace(/"/g, '&quot;')
      .replace(/'/g, '&#39;');
  }

  const inputMeasureSpan = document.createElement('span');
  inputMeasureSpan.style.position = 'absolute';
  inputMeasureSpan.style.top = '-9999px';
  inputMeasureSpan.style.left = '-9999px';
  inputMeasureSpan.style.whiteSpace = 'pre';
  inputMeasureSpan.style.visibility = 'hidden';
  inputMeasureSpan.style.pointerEvents = 'none';
  document.body.appendChild(inputMeasureSpan);

  function collectExprValues() {
    return Array.from(document.querySelectorAll('.gmod-node-expression'))
      .map(function(input) { return input.value; });
  }

  function saveFormState() {
    try {
      const state = {
        locationScope: locationScopeInput?.value || '',
        filterExpression: filterExpressionInput?.value || '',
        filterRegex: filterRegexInput?.value || '',
        expressions: collectExprValues()
      };
      sessionStorage.setItem(STORAGE_KEY, JSON.stringify(state));
    } catch (e) {
      // Ignore storage errors
    }
  }

  function attachExprInputListeners(input) {
    input.addEventListener('keydown', handleExprEnter);
    input.addEventListener('input', saveFormState);
  }

  function createExprItem(value) {
    const newItem = document.createElement('div');
    newItem.className = 'gmod-expr-item';
    const safeValue = (value != null && value !== '') ? ' value="' + escapeHtml(value) + '"' : '';
    newItem.innerHTML = '<input type="text" class="gmod-node-expression" placeholder="e.g., zone_temp/address.value" title="Property path to retrieve from each matching node"' + safeValue + ' autocomplete="off" autocorrect="off" autocapitalize="off" spellcheck="false">' +
      '<button type="button" onclick="gmodRemoveExpression(this)">Remove</button>';
    const newInput = newItem.querySelector('.gmod-node-expression');
    attachExprInputListeners(newInput);
    return newItem;
  }

  function rebuildExprList(values) {
    const exprList = document.getElementById('gmodExprList');
    exprList.innerHTML = '';
    const items = (values && values.length > 0) ? values : [''];
    for (let i = 0; i < items.length; i++) {
      exprList.appendChild(createExprItem(items[i]));
    }
  }

  function loadFormState() {
    try {
      const raw = sessionStorage.getItem(STORAGE_KEY);
      if (!raw) return;
      const state = JSON.parse(raw);
      if (state && typeof state === 'object') {
        if (typeof state.locationScope === 'string') {
          locationScopeInput.value = state.locationScope;
        }
        if (typeof state.filterExpression === 'string') {
          filterExpressionInput.value = state.filterExpression;
        }
        if (typeof state.filterRegex === 'string') {
          filterRegexInput.value = state.filterRegex;
        }
        if (Array.isArray(state.expressions)) {
          rebuildExprList(state.expressions);
        }
      }
    } catch (e) {
      // Ignore storage errors
    }
  }

  function findCommonPrefix(paths) {
    if (paths.length <= 1) return '';
    let prefix = paths[0];
    for (let i = 1; i < paths.length; i++) {
      let j = 0;
      while (j < prefix.length && j < paths[i].length && prefix[j] === paths[i][j]) {
        j++;
      }
      prefix = prefix.substring(0, j);
      if (!prefix) return '';
    }
    // Trim to last " / " boundary to avoid cutting mid-name
    const lastSep = prefix.lastIndexOf(' / ');
    if (lastSep >= 0) {
      return prefix.substring(0, lastSep + 3);
    }
    // Try plain "/" boundary
    const lastSlash = prefix.lastIndexOf('/');
    if (lastSlash >= 0) {
      return prefix.substring(0, lastSlash + 1);
    }
    return '';
  }

  function updateReferenceData() {
    referenceData = equipmentData.map(function(eq) {
      return {
        dbid: eq.dbid,

            currentValue: p.currentValue

  }

  // -- Expression list management (Tab 1) -------------------------------------

  function handleExprEnter(event) {
    if (event.key === 'Enter') {
      event.preventDefault();

      const value = input.value.trim();
      const exprList = document.getElementById('gmodExprList');
      const currentItem = input.closest('.gmod-expr-item');
      const currentIndex = Array.from(exprList.children).indexOf(currentItem);

      if (value.includes(',')) {
        const parts = value.split(',');
        if (parts.length > 1) {
          input.value = parts[0].trim();
          for (let i = 1; i < parts.length; i++) {
            const newItem = createExprItem(parts[i].trim());
            if (currentIndex + i < exprList.children.length) {
              exprList.insertBefore(newItem, exprList.children[currentIndex + i]);
            } else {
              exprList.appendChild(newItem);
            }
          }
        }
      } else {
        const newItem = createExprItem('');
        if (currentIndex + 1 < exprList.children.length) {
          exprList.insertBefore(newItem, exprList.children[currentIndex + 1]);
        } else {
          exprList.appendChild(newItem);
        }
        const newInput = newItem.querySelector('.gmod-node-expression');
        newInput.focus();
      }
      saveFormState();
    }

  function attachTableListeners() {
    document.querySelectorAll('.gmod-enable-cb').forEach(function(cb) {
      cb.addEventListener('change', function() {
        const eqIdx = parseInt(this.getAttribute('data-eq'));
        const propIdx = parseInt(this.getAttribute('data-prop'));
        equipmentData[eqIdx].properties[propIdx].enabled = this.checked;
        // Enable/disable the corresponding input field
        const input = document.querySelector('.gmod-newval-input[data-eq="' + eqIdx + '"][data-prop="' + propIdx + '"]');
        if (input) {
          input.disabled = !this.checked;
        }
        updateEnableAllCheckbox();
        renderJson();
      });
    });
    const newValueInputs = Array.from(document.querySelectorAll('.gmod-newval-input'));
    function resizeNewValueInput(input) {
      if (!input) return;
      const style = window.getComputedStyle(input);
      const text = input.value || input.placeholder || '';
      inputMeasureSpan.style.font = style.font;
      inputMeasureSpan.style.letterSpacing = style.letterSpacing;
      inputMeasureSpan.style.textTransform = style.textTransform;
      inputMeasureSpan.textContent = text || ' ';
      const textWidth = inputMeasureSpan.getBoundingClientRect().width;
      const paddingLeft = parseFloat(style.paddingLeft) || 0;
      const paddingRight = parseFloat(style.paddingRight) || 0;
      const borderLeft = parseFloat(style.borderLeftWidth) || 0;
      const borderRight = parseFloat(style.borderRightWidth) || 0;
      const extra = paddingLeft + paddingRight + borderLeft + borderRight + 2;
      const maxWidth = input.parentElement ? input.parentElement.clientWidth : textWidth + extra;
      const newWidth = Math.min(maxWidth, Math.max(60, Math.ceil(textWidth + extra)));
      input.style.width = newWidth + 'px';
    }
    function focusAdjacentInput(currentInput, direction) {
      const currentIndex = newValueInputs.indexOf(currentInput);
      if (currentIndex === -1) return;
      const step = direction === 'up' ? -1 : 1;
      for (let i = currentIndex + step; i >= 0 && i < newValueInputs.length; i += step) {
        if (!newValueInputs[i].disabled) {
          newValueInputs[i].focus();
          return;
        }
      }
    }
    newValueInputs.forEach(function(input) {
      input.addEventListener('input', function() {
        const eqIdx = parseInt(this.getAttribute('data-eq'));
        const propIdx = parseInt(this.getAttribute('data-prop'));
        equipmentData[eqIdx].properties[propIdx].newValue = this.value;
        renderJson();
        resizeNewValueInput(this);
      });
      input.addEventListener('keydown', function(event) {
        if (event.key === 'Enter' || event.key === 'ArrowDown') {
          event.preventDefault();
          focusAdjacentInput(this, 'down');
        } else if (event.key === 'ArrowUp') {
          event.preventDefault();
          focusAdjacentInput(this, 'up');
        }
      });
    });
    function stabilizeNewValueWidths(iteration, lastWidths) {
      const widths = newValueInputs.map(function(input) {
        resizeNewValueInput(input);
        return input.offsetWidth;
      });
      let changed = widths.length !== lastWidths.length;
      for (let i = 0; i < widths.length && !changed; i++) {
        if (widths[i] !== lastWidths[i]) {
          changed = true;
        }
      }
      if (changed && iteration < 36) {
        requestAnimationFrame(function() {
          stabilizeNewValueWidths(iteration + 1, widths);
        });
      }
    }
    requestAnimationFrame(function() {
      stabilizeNewValueWidths(0, []);
    });
  }

  function renderJson() {
    jsonEditor.value = JSON.stringify(equipmentData, null, 2);

  // -- JSON validation --------------------------------------------------------

  function validateAndSyncFromJson() {
    const text = jsonEditor.value;
    let parsed;
    try {
      parsed = JSON.parse(text);
    } catch (e) {
      alert('Invalid JSON: ' + e.message);
      renderJson();
      return false;
    }

    if (!Array.isArray(parsed) || parsed.length !== referenceData.length) {
      alert('Invalid JSON: equipment count does not match the original data.');
      renderJson();
      return false;
    }

    const refByDbid = {};
    for (let i = 0; i < referenceData.length; i++) {
      refByDbid[String(referenceData[i].dbid)] = referenceData[i];
    }

    for (let i = 0; i < parsed.length; i++) {
      const item = parsed[i];
      if (!item || typeof item !== 'object') {
        alert('Invalid JSON: item at index ' + i + ' is not an object.');
        renderJson();
        return false;
      }

      const ref = refByDbid[String(item.dbid)];
      if (!ref) {
        alert('Invalid JSON: dbid mismatch at index ' + i + '. Only "enabled" and "newValue" may be edited.');
        renderJson();
        return false;
      }

      // Override displayPath to the original value if changed
      item.displayPath = ref.displayPath;

      if (!Array.isArray(item.properties) || item.properties.length !== ref.properties.length) {
        alert('Invalid JSON: properties count mismatch at index ' + i + '.');
        renderJson();
        return false;
      }

      const refPropsByExpr = {};
      for (let j = 0; j < ref.properties.length; j++) {
        refPropsByExpr[ref.properties[j].expression] = ref.properties[j];
      }

      for (let j = 0; j < item.properties.length; j++) {
        const prop = item.properties[j];
        const refProp = refPropsByExpr[prop.expression];
        if (!refProp) {
          alert('Invalid JSON: expression mismatch at equipment ' + i + ', property ' + j + '. Only "enabled" and "newValue" may be edited.');
          renderJson();
          return false;
        }

        // Override currentValue to the original value if changed
        prop.currentValue = refProp.currentValue;

        if (typeof prop.enabled !== 'boolean') {
          alert('Invalid JSON: "enabled" must be a boolean at equipment ' + i + ', property ' + j + '.');
          renderJson();
          return false;
        }
        if (prop.newValue == null) {
          prop.newValue = '';
        } else if (typeof prop.newValue !== 'string') {
          prop.newValue = String(prop.newValue);
        }
      }
    }

    // Valid - update equipmentData by dbid/expression
    const eqIndexByDbid = {};
    for (let i = 0; i < equipmentData.length; i++) {
      eqIndexByDbid[String(equipmentData[i].dbid)] = i;
    }
    for (let i = 0; i < parsed.length; i++) {
      const eqIdx = eqIndexByDbid[String(parsed[i].dbid)];
      if (eqIdx == null) continue;
      const propIndexByExpr = {};
      for (let j = 0; j < equipmentData[eqIdx].properties.length; j++) {
        propIndexByExpr[equipmentData[eqIdx].properties[j].expression] = j;
      }
      for (let j = 0; j < parsed[i].properties.length; j++) {
        const expr = parsed[i].properties[j].expression;
        const propIdx = propIndexByExpr[expr];
        if (propIdx == null) continue;
        equipmentData[eqIdx].properties[propIdx].enabled = parsed[i].properties[j].enabled;
        equipmentData[eqIdx].properties[propIdx].newValue = parsed[i].properties[j].newValue;
      }
    }
    renderTable();
    return true;
  }

  // -- Refresh current values (re-query from server) -------------------------

  async function refreshCurrentValues() {
    showLoading();
    try {
      const allDbids = equipmentData.map(function(eq) { return eq.dbid; });
      const batchSize = 500;
      const refreshErrors = [];

      // Map dbid to equipment index
      const dbidToIndex = {};
      for (let i = 0; i < equipmentData.length; i++) {
        dbidToIndex[String(equipmentData[i].dbid)] = i;
      }

      for (let i = 0; i < allDbids.length; i += batchSize) {
        const batch = allDbids.slice(i, i + batchSize);
        const execResult = await client.sendRequest('ExecGQL', {
          nodes: batch,
          get: userExpressions,
          fieldAccess: true
        });

        if (execResult?.status !== 200) {
          console.error('ExecGQL response:', execResult);
          alert('Failed to refresh values');
          return;
        }

        if (execResult.response?.errors && execResult.response.errors.length > 0) {
          console.warn('ExecGQL returned errors:', execResult.response.errors);
          refreshErrors.push.apply(refreshErrors, execResult.response.errors);
        }

        if (execResult.response?.nodes) {
          const nodeCount = Math.min(execResult.response.nodes.length, batch.length);
          for (let j = 0; j < nodeCount; j++) {
            const node = execResult.response.nodes[j];
            const dbid = batch[j];
            const eqIdx = dbidToIndex[String(dbid)];
            if (eqIdx !== undefined) {
              for (let k = 0; k < userExpressions.length; k++) {
                equipmentData[eqIdx].properties[k].currentValue = toStr(node['get' + (k + 1)]);
              }
            }
          }
        }
      }

      updateReferenceData();

      if (refreshErrors.length > 0) {
        alert('Refresh completed with ' + refreshErrors.length + ' error(s). Check console for details.');
      }
    } finally {
      hideLoading();
    }
  }

  // -- Search handler ---------------------------------------------------------

  window.gmodHandleSearch = async function() {
    const locationScope = document.getElementById('gmodLocationScope')?.value?.trim();
    const filterExpression = document.getElementById('gmodFilterExpression')?.value?.trim();
    const filterRegex = document.getElementById('gmodFilterRegex')?.value?.trim();

    // Collect, normalize, and deduplicate node expressions
    const rawExprs = Array.from(document.querySelectorAll('.gmod-node-expression'))
      .map(function(input) { return input.value.trim().toLowerCase(); })
      .filter(function(v) { return v.length > 0; });
    const seen = {};
    const uniqueExprs = [];
    for (let i = 0; i < rawExprs.length; i++) {
      if (!seen[rawExprs[i]]) {
        seen[rawExprs[i]] = true;
        uniqueExprs.push(rawExprs[i]);
      }
    }

    // Validate
    if (!locationScope) {
      alert('Please enter a location scope');
      return;
    }
    if (!filterExpression) {
      alert('Please enter a filter expression');
      return;
    }
    if (!filterRegex) {
      alert('Please enter a filter regex');
      return;
    }
    if (uniqueExprs.length === 0) {
      alert('Please enter at least one node expression');
      return;
    }

    userExpressions = uniqueExprs;

    showLoading();
    try {
      const searchErrors = [];

      // -- Step 1: SearchGQL - geographic tree --
      const leafFilter = {
        and: [
          { hasType: ['BEQU'] },
          { expression: filterExpression, regex: filterRegex }
        ]
      };

      let searchResult = await client.sendRequest('SearchGQL', {
        steps: [
          {
            includeRoots: true,
            intermediateFilter: { hasType: ['TREE', 'AREA'] },
            leafFilter: leafFilter
          }
        ],
        roots: [locationScope]
      });

      if (searchResult?.status !== 200) {
        console.error('SearchGQL response:', searchResult);
        alert('Failed to search equipment locations');
        return;
      }

      if (searchResult.response?.errors && searchResult.response.errors.length > 0) {
        console.warn('SearchGQL returned errors:', searchResult.response.errors);
        searchErrors.push.apply(searchErrors, searchResult.response.errors);
      }

      let allDbids = searchResult.response?.dbids || [];

      // -- Step 2: Fallback - network tree --
      if (allDbids.length === 0) {
        const fallbackResult = await client.sendRequest('SearchGQL', {
          steps: [
            {
              includeRoots: true,
              intermediateFilter: { hasType: ['TREE', 'SITE', 'BNET', 'BHWRD', 'BHWD'] },
              leafFilter: { hasType: ['LINK'] },
              jump: '~target'
            },
            {
              includeRoots: true,
              leafFilter: leafFilter
            }
          ],
          roots: [locationScope]
        });

        if (fallbackResult?.status !== 200) {
          console.error('SearchGQL fallback response:', fallbackResult);
          alert('Failed to search equipment locations (network tree fallback)');
          return;
        }

        if (fallbackResult.response?.errors && fallbackResult.response.errors.length > 0) {
          console.warn('SearchGQL fallback returned errors:', fallbackResult.response.errors);
          searchErrors.push.apply(searchErrors, fallbackResult.response.errors);
        }

        allDbids = fallbackResult.response?.dbids || [];
      }

      if (allDbids.length === 0) {
        alert('No matching equipment locations were found');
        return;
      }

      // -- Step 3: ExecGQL - fetch display-path + expression values --
      const getList = ['.display-path'].concat(userExpressions);
      const batchSize = 500;
      const newEquipment = [];

      for (let i = 0; i < allDbids.length; i += batchSize) {
        const batch = allDbids.slice(i, i + batchSize);
        const execResult = await client.sendRequest('ExecGQL', {
          nodes: batch,
          get: getList,
          fieldAccess: true
        });

        if (execResult?.status !== 200) {
          console.error('ExecGQL response:', execResult);
          alert('Failed to retrieve property values');
          return;
        }

        if (execResult.response?.errors && execResult.response.errors.length > 0) {
          console.warn('ExecGQL returned errors:', execResult.response.errors);
          searchErrors.push.apply(searchErrors, execResult.response.errors);
        }

        if (execResult.response?.nodes) {
          const nodeCount = Math.min(execResult.response.nodes.length, batch.length);
          for (let j = 0; j < nodeCount; j++) {
            const node = execResult.response.nodes[j];
            const displayPath = toStr(node.get1);
            const properties = [];
            for (let k = 0; k < userExpressions.length; k++) {
              const val = toStr(node['get' + (k + 2)]);
              properties.push({
                enabled: true,
                expression: userExpressions[k],
                currentValue: val,
                newValue: val
              });
            }
            newEquipment.push({
              dbid: batch[j],
              displayPath: displayPath,
              properties: properties
            });
          }
        }
      }

      if (newEquipment.length === 0) {
        alert('No equipment data could be retrieved');
        return;
      }

      // -- Step 4: Detect and strip common prefix --
      const paths = newEquipment.map(function(eq) { return eq.displayPath; });
      const commonPrefix = findCommonPrefix(paths);
      if (commonPrefix) {
        for (let i = 0; i < newEquipment.length; i++) {
          newEquipment[i].displayPath = newEquipment[i].displayPath.substring(commonPrefix.length);
        }
      }

      // -- Step 5: Populate state and switch to results tab --
      equipmentData = newEquipment;
      updateReferenceData();

      // Reset view to table
      isJsonView = false;
      viewToggle.classList.remove('active');
      tableView.style.display = 'block';
      jsonView.style.display = 'none';
      resultsControls.style.display = 'flex';
      resultsLeft.style.display = 'flex';
      container.classList.add('gmod-wide');

      renderTable();
      renderJson();
      renderRegexCheckboxes();

      searchTab.classList.remove('active');
      resultsTab.classList.add('active');

      if (searchErrors.length > 0) {
        alert('Search completed with ' + searchErrors.length + ' error(s). Some data may be incomplete. Check console for details.');
      }

    } catch (error) {
      console.error('Search error:', error);
      alert('An error occurred during search: ' + (error?.message || error));
    } finally {
      hideLoading();
    }
  };

  // -- Apply Changes ----------------------------------------------------------

  window.gmodApplyChanges = async function() {
    // If in JSON view, validate first
    if (isJsonView) {
      if (!validateAndSyncFromJson()) return;
    }

    // Collect changes grouped by identical set arrays
    const changeGroups = {};
    let hasChanges = false;

    for (let i = 0; i < equipmentData.length; i++) {
      const eq = equipmentData[i];
      const setArray = [];
      for (let j = 0; j < eq.properties.length; j++) {
        const prop = eq.properties[j];
        if (prop.enabled && prop.currentValue !== prop.newValue) {
          setArray.push({
            expression: prop.expression,
            value: prop.newValue
          });
        }
      }
      if (setArray.length > 0) {
        hasChanges = true;
        const key = JSON.stringify(setArray);
        if (!changeGroups[key]) {
          changeGroups[key] = { setArray: setArray, dbids: [] };
        }
        changeGroups[key].dbids.push(eq.dbid);
      }
    }

    if (!hasChanges) {
      alert('No changes to apply');
      return;
    }

    showLoading();
    try {
      const applyErrors = [];
      const batchSize = 100;

      for (const key in changeGroups) {
        const group = changeGroups[key];
        for (let i = 0; i < group.dbids.length; i += batchSize) {
          const batch = group.dbids.slice(i, i + batchSize);
          const execResult = await client.sendRequest('ExecGQL', {
            nodes: batch,
            set: group.setArray,
            fieldAccess: true
          });

          if (execResult?.status !== 200) {
            console.error('ExecGQL response:', execResult);
            applyErrors.push('ExecGQL failed with status ' + (execResult?.status || 'unknown'));
            continue;
          }

          if (execResult.response?.errors && execResult.response.errors.length > 0) {
            console.warn('ExecGQL returned errors:', execResult.response.errors);
            applyErrors.push.apply(applyErrors, execResult.response.errors);
          }
        }
      }

      if (applyErrors.length > 0) {
        alert('Apply completed with ' + applyErrors.length + ' error(s). Re-querying current values...\nCheck console for details.');
        await refreshCurrentValues();
        // Keep user's newValues as-is so they can see what they tried
        renderTable();
        renderJson();
      } else {
        // Success - update currentValues for applied changes
        for (let i = 0; i < equipmentData.length; i++) {
          for (let j = 0; j < equipmentData[i].properties.length; j++) {
            const prop = equipmentData[i].properties[j];
            if (prop.enabled && prop.currentValue !== prop.newValue) {
              prop.currentValue = prop.newValue;
            }
          }
        }
        updateReferenceData();
        renderTable();
        renderJson();
      }

    } catch (error) {
      console.error('Apply error:', error);
      alert('An error occurred while applying changes: ' + (error?.message || error));
      try {
        await refreshCurrentValues();
        renderTable();
        renderJson();
      } catch (refreshErr) {
        console.error('Refresh after error failed:', refreshErr);
      }
    } finally {
      hideLoading();
    }
  };

  // -- Reset ------------------------------------------------------------------

  window.gmodReset = async function() {
    try {
      await refreshCurrentValues();
      renderTable();
      renderJson();
    } catch (error) {
      console.error('Reset error:', error);
      alert('An error occurred during reset: ' + (error?.message || error));
    }
  };

  // -- Clear ------------------------------------------------------------------

  window.gmodClear = function() {
    for (let i = 0; i < equipmentData.length; i++) {
      for (let j = 0; j < equipmentData[i].properties.length; j++) {
        equipmentData[i].properties[j].newValue = equipmentData[i].properties[j].currentValue;
      }
    }
    renderTable();
    renderJson();
  };

  // -- Regex Find/Replace -----------------------------------------------------

  // Live regex validation on the Find field
  document.getElementById('gmodRegexFind').addEventListener('input', function() {
    var errorSpan = document.getElementById('gmodRegexError');
    try {
      new RegExp(this.value, 'g');
      errorSpan.textContent = '';
    } catch (e) {
      errorSpan.textContent = e.message;
    }
  });

  window.gmodExecuteReplace = function() {
    const findVal = document.getElementById('gmodRegexFind')?.value || '';
    const replaceVal = document.getElementById('gmodRegexReplace')?.value || '';

    let regex;
    try {
      regex = new RegExp(findVal, 'g');
    } catch (e) {
      // Error already shown inline; just abort
      return;
    }

    // Determine which expressions are selected
    const selectedExprs = new Set();
    for (let i = 0; i < userExpressions.length; i++) {
      const cb = document.getElementById('gmodRegexCb' + i);
      if (cb && cb.checked) {
        selectedExprs.add(userExpressions[i]);
      }
    }

    if (selectedExprs.size === 0) {
      alert('Please select at least one expression for the replacement');
      return;
    }

    // Apply regex to matching newValues across all equipment
    for (let i = 0; i < equipmentData.length; i++) {
      for (let j = 0; j < equipmentData[i].properties.length; j++) {
        const prop = equipmentData[i].properties[j];
        if (selectedExprs.has(prop.expression)) {
          // Reset lastIndex for global regex
          regex.lastIndex = 0;
          prop.newValue = prop.newValue.replace(regex, replaceVal);
        }
      }
    }

    renderTable();
    renderJson();
  };

})();
</script>
