<div style="width:98%;height:98%;padding:10px;font-family:Arial,sans-serif;background:#1a1a1a">
  <style>
    .cputil-container {
      max-width: 900px;
      margin: 0 auto;
      background: #2d2d2d;
      border-radius: 8px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.5);
      padding: 14px;
    }
    .cputil-header {
      text-align: center;
      margin-bottom: 12px;
    }
    .cputil-header h2 {
      margin: 0 0 6px 0;
      color: #e0e0e0;
    }
    .cputil-header p {
      margin: 0;
      color: #b0b0b0;
      font-size: 15px;
    }
    .cputil-mode-toggle {
      display: flex;
      justify-content: center;
      align-items: center;
      margin-bottom: 12px;
      gap: 12px;
    }
    .cputil-mode-toggle label {
      font-weight: 600;
      color: #b0b0b0;
    }
    .cputil-toggle-switch {
      position: relative;
      width: 64px;
      height: 32px;
      background: #4CAF50;
      border-radius: 16px;
      cursor: pointer;
      transition: background 0.3s;
    }
    .cputil-toggle-switch.active {
      background: #2196F3;
    }
    .cputil-toggle-switch::after {
      content: '';
      position: absolute;
      top: 3px;
      left: 3px;
      width: 26px;
      height: 26px;
      background: white;
      border-radius: 50%;
      transition: transform 0.3s;
    }
    .cputil-toggle-switch.active::after {
      transform: translateX(32px);
    }
    .cputil-mode-content {
      display: none;
    }
    .cputil-mode-content.active {
      display: block;
    }
    .cputil-form-group {
      margin-bottom: 14px;
    }
    .cputil-form-group label {
      display: block;
      margin-bottom: 7px;
      font-weight: 600;
      font-size: 16px;
      color: #e0e0e0;
    }
    .cputil-form-group input[type="text"] {
      width: 100%;
      padding: 8px 10px;
      border: 1px solid #444;
      border-radius: 4px;
      font-size: 15px;
      line-height: 1.5;
      box-sizing: border-box;
      background: #1a1a1a;
      color: #e0e0e0;
      overflow: visible;
    }
    .cputil-form-group input[type="text"]:focus {
      outline: none;
      border-color: #4CAF50;
      box-shadow: 0 0 0 2px rgba(76,175,80,0.3);
    }
    .cputil-form-group input[type="file"] {
      display: none;
    }
    .cputil-custom-file-button {
      display: inline-block;
      padding: 11px 17px;
      background: #1a1a1a;
      color: #e0e0e0;
      border: 1px solid #444;
      border-radius: 4px;
      cursor: pointer;
      font-size: 15px;
      transition: all 0.2s;
      text-align: center;
    }
    .cputil-custom-file-button:hover {
      background: #333;
      border-color: #666;
    }
    .cputil-file-name-display {
      display: inline-block;
      margin-left: 12px;
      color: #b0b0b0;
      font-size: 15px;
      font-style: italic;
    }
    .cputil-doc-link {
      display: inline-block;
      margin-top: 4px;
      font-size: 13px;
      color: #4CAF50;
      text-decoration: none;
    }
    .cputil-doc-link:hover {
      text-decoration: underline;
    }
    .cputil-checkbox-grid {
      display: grid;
      grid-template-rows: repeat(11, auto);
      grid-auto-flow: column;
      grid-auto-columns: minmax(210px, 1fr);
      gap: 13px;
      padding: 17px;
      background: #1a1a1a;
      border-radius: 4px;
      max-height: 490px;
      overflow-y: auto;
    }
    .cputil-checkbox-item {
      display: flex;
      align-items: center;
      gap: 9px;
    }
    .cputil-checkbox-item input[type="checkbox"] {
      width: 19px;
      height: 19px;
      cursor: pointer;
      accent-color: #4CAF50;
    }
    .cputil-checkbox-item label {
      margin: 0;
      font-size: 14px;
      color: #b0b0b0;
      cursor: pointer;
      user-select: none;
    }
    .cputil-checkbox-controls {
      display: flex;
      gap: 12px;
      margin-bottom: 11px;
    }
    .cputil-checkbox-controls button {
      padding: 7px 13px;
      font-size: 14px;
      border: 1px solid #444;
      background: #1a1a1a;
      color: #e0e0e0;
      border-radius: 4px;
      cursor: pointer;
      transition: all 0.2s;
    }
    .cputil-checkbox-controls button:hover {
      background: #333;
      border-color: #666;
    }
    .cputil-location-list {
      margin-bottom: 13px;
      max-height: 525px;
      overflow-y: auto;
      padding-right: 5px;
    }
    .cputil-location-item {
      display: flex;
      gap: 9px;
      margin-bottom: 9px;
    }
    .cputil-location-item input {
      flex: 1;
    }
    .cputil-location-item button {
      padding: 11px 17px;
      background: #f44336;
      color: white;
      border: none;
      border-radius: 4px;
      cursor: pointer;
      font-size: 14px;
      transition: background 0.2s;
    }
    .cputil-location-item button:hover {
      background: #d32f2f;
    }
    .cputil-add-location-btn {
      padding: 9px 17px;
      background: #2196F3;
      color: white;
      border: none;
      border-radius: 4px;
      cursor: pointer;
      font-size: 15px;
      transition: background 0.2s;
    }
    .cputil-add-location-btn:hover {
      background: #1976D2;
    }
    .cputil-action-button {
      width: 100%;
      padding: 15px;
      background: #4CAF50;
      color: white;
      border: none;
      border-radius: 4px;
      font-size: 17px;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.2s;
      margin-top: 16px;
    }
    .cputil-action-button:hover {
      background: #45a049;
    }
    .cputil-action-button.cputil-import {
      background: #2196F3;
    }
    .cputil-action-button.cputil-import:hover {
      background: #1976D2;
    }
  </style>

          Choose File

            <button type="button" onclick="cputilRemoveLocation(this)">Remove</button>

<script src="/RestAPI/docs/api.js"></script>
<script>
  (function (){
    const client = new WebCTRLAPIClient();
    
    // Mode toggle functionality
    const modeToggle = document.getElementById('modeToggle');
    const exportMode = document.getElementById('exportMode');
    const importMode = document.getElementById('importMode');
    const modeStorageKey = 'cputil_activeMode';

    function setActiveMode(mode) {
      const isImport = mode === 'import';
      modeToggle.classList.toggle('active', isImport);
      exportMode.classList.toggle('active', !isImport);
      importMode.classList.toggle('active', isImport);
      try {
        sessionStorage.setItem(modeStorageKey, isImport ? 'import' : 'export');
      } catch (e) {}
    }

    modeToggle.addEventListener('click', function() {
      const nextMode = modeToggle.classList.contains('active') ? 'export' : 'import';
      setActiveMode(nextMode);
    });

    try {
      const savedMode = sessionStorage.getItem(modeStorageKey);
      if (savedMode === 'import' || savedMode === 'export') {
        setActiveMode(savedMode);
      }
    } catch (e) {}
    
    // File input change listener
    const fileInput = document.getElementById('importFile');
    const fileNameDisplay = document.getElementById('fileNameDisplay');
    fileInput.addEventListener('change', function() {
      if (this.files.length > 0) {
        fileNameDisplay.textContent = this.files[0].name;
      } else {
        fileNameDisplay.textContent = 'No file chosen';
      }
    });
    
    // Session storage helpers for export form
    const exportLocationInput = document.getElementById('exportLocation');
    const microblockRegexInput = document.getElementById('microblockRegex');
    const categoryCheckboxSelector = '#categoryCheckboxes input[type="checkbox"]';
    const storageKeys = {
      location: 'cputil_exportLocation',
      regex: 'cputil_microblockRegex',
      categories: 'cputil_exportCategories'
    };

    function saveExportLocation() {
      if (!exportLocationInput) return;
      try {
        sessionStorage.setItem(storageKeys.location, exportLocationInput.value || '');
      } catch (e) {}
    }

    function saveMicroblockRegex() {
      if (!microblockRegexInput) return;
      try {
        sessionStorage.setItem(storageKeys.regex, microblockRegexInput.value || '');
      } catch (e) {}
    }

    function saveExportCategories() {
      try {
        const checked = Array.from(document.querySelectorAll(categoryCheckboxSelector + ':checked'))
          .map(cb => cb.value);
        sessionStorage.setItem(storageKeys.categories, JSON.stringify(checked));
      } catch (e) {}
    }

    function loadExportFormFromSession() {
      try {
        const savedLocation = sessionStorage.getItem(storageKeys.location);
        if (savedLocation !== null && exportLocationInput) {
          exportLocationInput.value = savedLocation;
        }
        const savedRegex = sessionStorage.getItem(storageKeys.regex);
        if (savedRegex !== null && microblockRegexInput) {
          microblockRegexInput.value = savedRegex;
        }
        const savedCategoriesRaw = sessionStorage.getItem(storageKeys.categories);
        if (savedCategoriesRaw) {
          const savedCategories = JSON.parse(savedCategoriesRaw);
          if (Array.isArray(savedCategories)) {
            const savedSet = new Set(savedCategories);
            document.querySelectorAll(categoryCheckboxSelector).forEach(cb => {
              cb.checked = savedSet.has(cb.value);
            });
          }
        }
      } catch (e) {}
    }

    // Category checkbox controls
    window.cputilSelectAllCategories = function() {
      document.querySelectorAll(categoryCheckboxSelector).forEach(cb => cb.checked = true);
      saveExportCategories();
    };
    
    window.cputilDeselectAllCategories = function() {
      document.querySelectorAll(categoryCheckboxSelector).forEach(cb => cb.checked = false);
      saveExportCategories();
    };

    if (exportLocationInput) {
      exportLocationInput.addEventListener('input', saveExportLocation);
    }
    if (microblockRegexInput) {
      microblockRegexInput.addEventListener('input', saveMicroblockRegex);
    }
    document.querySelectorAll(categoryCheckboxSelector).forEach(cb => {
      cb.addEventListener('change', saveExportCategories);
    });
    loadExportFormFromSession();
    
    // Import target locations persistence
    const importStorageKey = 'cputil_importLocations';

    function getImportLocations() {
      return Array.from(document.querySelectorAll('.cputil-import-location'))
        .map(input => input?.value?.trim())
        .filter(v => v);
    }

    function saveImportLocations() {
      try {
        sessionStorage.setItem(importStorageKey, JSON.stringify(getImportLocations()));
      } catch (e) {}
    }

    function attachImportLocationListeners(input) {
      if (!input) return;
      input.addEventListener('keydown', handleLocationEnter);
      input.addEventListener('input', saveImportLocations);
    }

    function loadImportLocations() {
      try {
        const raw = sessionStorage.getItem(importStorageKey);
        if (!raw) return;
        const locations = JSON.parse(raw);
        if (!Array.isArray(locations) || locations.length === 0) return;
        const locationList = document.getElementById('locationList');
        if (!locationList) return;
        locationList.innerHTML = '';
        locations.forEach(value => {
          const newItem = document.createElement('div');
          newItem.className = 'cputil-location-item';
          newItem.innerHTML = '<input type="text" class="cputil-import-location" placeholder="e.g., #campus/building/floor/equipment" value="' + value + '" autocomplete="off" autocorrect="off" autocapitalize="off" spellcheck="false">' +
            '<button type="button" onclick="cputilRemoveLocation(this)">Remove</button>';
          locationList.appendChild(newItem);
          const newInput = newItem.querySelector('.cputil-import-location');
          attachImportLocationListeners(newInput);
        });
      } catch (e) {}
    }

    // Handle Enter key in location fields to split comma-delimited values
    function handleLocationEnter(event) {
      if (event.key === 'Enter') {
        event.preventDefault();
        const input = event.target;
        const value = input.value.trim();
        const locationList = document.getElementById('locationList');
        const currentItem = input.closest('.cputil-location-item');
        const currentIndex = Array.from(locationList.children).indexOf(currentItem);
        
        // Check if value contains commas
        if (value.includes(',')) {
          const locations = value.split(',');
          if (locations.length > 1) {
            // Set the first location in the current field
            input.value = locations[0];
            
            // Create new fields for the remaining locations
            for (let i = 1; i < locations.length; i++) {
              const newItem = document.createElement('div');
              newItem.className = 'cputil-location-item';
              newItem.innerHTML = '<input type="text" class="cputil-import-location" placeholder="e.g., #campus/building/floor/equipment" value="' + locations[i] + '" autocomplete="off" autocorrect="off" autocapitalize="off" spellcheck="false">' +
                '<button type="button" onclick="cputilRemoveLocation(this)">Remove</button>';
              
              // Insert after the current item
              if (currentIndex + i < locationList.children.length) {
                locationList.insertBefore(newItem, locationList.children[currentIndex + i]);
              } else {
                locationList.appendChild(newItem);
              }
              
              // Attach event listener to the new input
              const newInput = newItem.querySelector('.cputil-import-location');
              attachImportLocationListeners(newInput);
            }
          }
        } else {
          // No commas - create a new blank field after current one
          const newItem = document.createElement('div');
          newItem.className = 'cputil-location-item';
          newItem.innerHTML = '<input type="text" class="cputil-import-location" placeholder="e.g., #campus/building/floor/equipment" autocomplete="off" autocorrect="off" autocapitalize="off" spellcheck="false">' +
            '<button type="button" onclick="cputilRemoveLocation(this)">Remove</button>';
          
          // Insert after the current item
          if (currentIndex + 1 < locationList.children.length) {
            locationList.insertBefore(newItem, locationList.children[currentIndex + 1]);
          } else {
            locationList.appendChild(newItem);
          }
          
          // Attach event listener to the new input and focus it
          const newInput = newItem.querySelector('.cputil-import-location');
          attachImportLocationListeners(newInput);
          newInput.focus();
        }
        saveImportLocations();
      }
    }
    
    // Attach event listener to existing location inputs
    document.querySelectorAll('.cputil-import-location').forEach(input => {
      attachImportLocationListeners(input);
    });
    loadImportLocations();
    
    // Location management for import
    window.cputilAddLocation = function() {
      const locationList = document.getElementById('locationList');
      const newItem = document.createElement('div');
      newItem.className = 'cputil-location-item';
      newItem.innerHTML = `
        <input type="text" class="cputil-import-location" placeholder="e.g., #campus/building/floor/equipment" autocomplete="off" autocorrect="off" autocapitalize="off" spellcheck="false">
        <button type="button" onclick="cputilRemoveLocation(this)">Remove</button>
      `;
      locationList.appendChild(newItem);
      
      // Attach event listener to the new input
      const newInput = newItem.querySelector('.cputil-import-location');
      attachImportLocationListeners(newInput);
      saveImportLocations();
    };
    
    window.cputilRemoveLocation = function(button) {
      const locationList = document.getElementById('locationList');
      if (locationList?.children?.length > 1) {
        button?.parentElement?.remove();
      } else {
        // Clear the text field instead of removing it
        const input = button?.parentElement?.querySelector('.cputil-import-location');
        if (input) {
          input.value = '';
        }
      }
      saveImportLocations();
    };
    
    // Helper function to download JSON
    function downloadJSON(data, filename) {
      const blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' });
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url;
      a.download = filename;
      document.body.appendChild(a);
      a.click();
      document.body.removeChild(a);
      URL.revokeObjectURL(url);
    }
    
    // Export handler
    window.cputilHandleExport = async function() {
      const location = document.getElementById('exportLocation')?.value?.trim();
      const microblockRegex = document.getElementById('microblockRegex')?.value?.trim();
      const allCheckboxes = document.querySelectorAll('#categoryCheckboxes input[type="checkbox"]');
      const checkedCheckboxes = document.querySelectorAll('#categoryCheckboxes input[type="checkbox"]:checked');
      const allCheckboxesSelected = allCheckboxes.length === checkedCheckboxes.length;
      const selectedCategories = new Set(
        Array.from(checkedCheckboxes).map(cb => cb.value)
      );
      
      // Validate inputs
      if (!location) {
        alert('Please enter a location path');
        return;
      }
      
      try {
        // Step 1: Validate location is a valid equipment (BEQU)
        const resolveResult = await client.sendRequest('ResolveGQL', {
          path: location,
          expression: ['.absolute-path','.definition']
        });
        
        if (resolveResult?.status !== 200) {
          console.error('ResolveGQL response:', resolveResult);
          alert('Failed to resolve location');
          return;
        }
        
        if (resolveResult.response?.['node-type'] !== 'BEQU') {
          alert('The specified path must be to a valid equipment location');
          return;
        }
        
        // Store location metadata for export
        const locationPath = resolveResult.response?.expr1;
        const locationDisplayName = resolveResult.response?.['display-name'];
        const locationDbid = resolveResult.response?.dbid;
        const locationCP = resolveResult.response?.expr2;
        
        const exportData = {};
        const exportErrors = [];
        
        // Build base search filter (reused in multiple steps)
        const baseSearchFilter = {
          and: [
            {
              not: {
                hasType: ['PGRP', 'BPRG']
              }
            },
            {
              expression: '.copy-category',
              equals: 'point_names'
            }
          ]
        };
        
        // Add regex filter if provided
        if (microblockRegex) {
          baseSearchFilter.and.push({
            expression: '.reference-name',
            regex: microblockRegex
          });
        }
        
        // Step 2: Handle point_names category
        if (selectedCategories.has('point_names')) {
          const searchResult = await client.sendRequest('SearchGQL', {
            steps: [
              {
                leafFilter: baseSearchFilter
              }
            ],
            roots: [locationDbid]
          });
          
          if (searchResult?.status !== 200) {
            console.error('SearchGQL response:', searchResult);
            alert('Failed to search nodes');
            return;
          }
          
          // Check for errors in the SearchGQL response
          if (searchResult.response?.errors && searchResult.response.errors.length > 0) {
            console.warn('SearchGQL returned errors:', searchResult.response.errors);
            exportErrors.push(...searchResult.response.errors);
          }
          
          if (searchResult.response?.dbids?.length > 0) {
            const execResult = await client.sendRequest('ExecGQL', {
              nodes: searchResult.response.dbids,
              get: [
                '.relative-path',
                '.display-name'
              ]
            });
            
            if (execResult?.status !== 200) {
              console.error('ExecGQL response:', execResult);
              alert('Failed to retrieve property values');
              return;
            }
            
            // Check for errors in the response
            if (execResult.response?.errors && execResult.response.errors.length > 0) {
              console.warn('ExecGQL returned errors:', execResult.response.errors);
              exportErrors.push(...execResult.response.errors);
            }
            
            if (execResult.response?.nodes) {
              for (const node of execResult.response.nodes) {
                if (node?.get1 && node?.get2 != null) {
                  exportData[node.get1 + '.display-name'] = node.get2;
                }
              }
            }
          }
        }
        
        // Step 3: Handle all_other_disp and netpoint_disp categories
        const dispCategories = ['all_other_disp', 'netpoint_disp'].filter(cat => selectedCategories.has(cat));
        
        if (dispCategories.length > 0) {
          // Build the intermediate filter based on selected categories
          let intermediateFilter;
          if (dispCategories.length === 1) {
            intermediateFilter = {
              not: {
                expression: '.copy-category',
                equals: dispCategories[0]
              }
            };
          } else {
            intermediateFilter = {
              not: {
                expression: '.copy-category',
                regex: '^(?:all_other|netpoint)_disp$'
              }
            };
          }
          
          const searchResult = await client.sendRequest('SearchGQL', {
            steps: [
              {
                leafFilter: baseSearchFilter
              },
              {
                intermediateFilter: intermediateFilter
              }
            ],
            roots: [locationDbid]
          });
          
          if (searchResult?.status !== 200) {
            console.error('SearchGQL response:', searchResult);
            alert('Failed to search nodes');
            return;
          }
          
          // Check for errors in the SearchGQL response
          if (searchResult.response?.errors && searchResult.response.errors.length > 0) {
            console.warn('SearchGQL returned errors:', searchResult.response.errors);
            exportErrors.push(...searchResult.response.errors);
          }
          
          if (searchResult.response?.dbids?.length > 0) {
            const execResult = await client.sendRequest('ExecGQL', {
              nodes: searchResult.response.dbids,
              get: [
                '.relative-path',
                '.display-name'
              ]
            });
            
            if (execResult?.status !== 200) {
              console.error('ExecGQL response:', execResult);
              alert('Failed to retrieve property values');
              return;
            }
            
            // Check for errors in the response
            if (execResult.response?.errors && execResult.response.errors.length > 0) {
              exportErrors.push(...execResult.response.errors);
              console.warn('ExecGQL returned errors:', execResult.response.errors);
            }
            
            if (execResult.response?.nodes) {
              for (const node of execResult.response.nodes) {
                if (node?.get1 && node?.get2 != null) {
                  exportData[node.get1 + '.display-name'] = node.get2;
                }
              }
            }
          }
        }
        
        // Step 4: Handle remaining copy categories
        const unhandledCategoriesSet = new Set(selectedCategories);
        unhandledCategoriesSet.delete('point_names');
        unhandledCategoriesSet.delete('all_other_disp');
        unhandledCategoriesSet.delete('netpoint_disp');
        
        if (unhandledCategoriesSet.size > 0) {
          // Build the intermediate filter regex
          let intermediateFilter;
          if (allCheckboxesSelected) {
            // All categories selected - exclude the handled ones and readonly
            intermediateFilter = {
              not: {
                expression: '.copy-category',
                regex: '^(?!readonly|all_other_disp|netpoint_disp).++$'
              }
            };
          } else {
            // Only some categories selected - match specific ones
            const regexPattern = '^(?:' + [...unhandledCategoriesSet].join('|') + ')$';
            intermediateFilter = {
              not: {
                expression: '.copy-category',
                regex: regexPattern
              }
            };
          }
          
          const ret1 = await client.sendRequest('SearchGQL', {
            steps: [
              {
                leafFilter: baseSearchFilter
              },
              {
                intermediateFilter: intermediateFilter,
                leafFilter: {
                  hasType: [
                    'URL',
                    'BOOLSET',
                    'CHOICE',
                    'ARRAY'
                  ]
                }
              },
              {
                leafFilter: {
                  hasType: [
                    'BOOL',
                    'UNS',
                    'CHRSTR',
                    'INT',
                    'REAL',
                    'ENUM',
                    'URL'
                  ]
                }
              }
            ],
            roots: [locationDbid]
          });
          
          if (ret1?.status !== 200) {
            console.error('SearchGQL response:', ret1);
            alert('Failed to search nodes');
            return;
          }
          
          // Check for errors in the SearchGQL response
          if (ret1.response?.errors && ret1.response.errors.length > 0) {
            console.warn('SearchGQL returned errors:', ret1.response.errors);
            exportErrors.push(...ret1.response.errors);
          }

          const ret2 = await client.sendRequest('SearchGQL', {
            steps: [
              {
                leafFilter: baseSearchFilter
              },
              {
                intermediateFilter: intermediateFilter,
                leafFilter: {
                  hasType: [
                    'BOOL',
                    'UNS',
                    'CHRSTR',
                    'INT',
                    'REAL',
                    'ENUM',
                    'URL'
                  ]
                }
              }
            ],
            roots: [locationDbid]
          });
          
          if (ret2?.status !== 200) {
            console.error('SearchGQL response:', ret2);
            alert('Failed to search nodes');
            return;
          }
          
          // Check for errors in the SearchGQL response
          if (ret2.response?.errors && ret2.response.errors.length > 0) {
            console.warn('SearchGQL returned errors:', ret2.response.errors);
            exportErrors.push(...ret2.response.errors);
          }
          
          // Combine dbids from both searches
          const allDbids = [
            ...(ret1.response?.dbids || []),
            ...(ret2.response?.dbids || [])
          ];
          
          // Process in batches of 500
          const batchSize = 500;
          for (let i = 0; i < allDbids.length; i += batchSize) {
            const batch = allDbids.slice(i, i + batchSize);
            
            const execResult = await client.sendRequest('ExecGQL', {
              nodes: batch,
              get: [
                '.relative-path',
                '.value'
              ]
            });
            
            if (execResult?.status !== 200) {
              console.error('ExecGQL response:', execResult);
              alert('Failed to get property values');
              return;
            }
            
            // Check for errors in the response
            if (execResult.response?.errors && execResult.response.errors.length > 0) {
              exportErrors.push(...execResult.response.errors);
            }
            
            if (execResult.response?.nodes) {
              for (const node of execResult.response.nodes) {
                if (node?.get1 && node?.get2 != null) {
                  exportData[node.get1+'.value'] = node.get2;
                }
              }
            }
          }
        }
        
        // Alert user if there were any errors during export
        if (exportErrors.length > 0) {
          alert('Export completed with ' + exportErrors.length + ' error(s).\nSome properties could not be retrieved.\nCheck console for details.');
        }
        
        // Download the exported data
        // Sort the exportData keys alphanumerically
        const sortedExportData = Object.keys(exportData)
          .sort()
          .reduce((acc, key) => {
            acc[key] = exportData[key];
            return acc;
          }, {});
        
        // Extract control program type from locationCP path
        let cpName = null;
        if (locationCP) {
          const match = locationCP.match(/[^/]+$/);
          if (match) {
            cpName = match[0];
          }
        }
        
        const locationName = locationPath.replace('#','').replace('/','-') || locationDbid;
        const t = Date.now();
        const filename = 'cp-export-' + locationName + '-' + t + '.json';
        downloadJSON({
          displayName: locationDisplayName,
          path: locationPath,
          controlProgram: cpName,
          dbid: locationDbid,
          time: t,
          properties: sortedExportData
        }, filename);
        
      } catch (error) {
        console.error('Export error:', error);
        alert('An error occurred during export: ' + (error?.message || error));
      }
    };
    
    // Import handler
    window.cputilHandleImport = async function() {
      const fileInput = document.getElementById('importFile');
      const locations = Array.from(
        document.querySelectorAll('.cputil-import-location')
      ).map(input => input?.value?.trim()).filter(v => v);
      
      // Validate inputs
      if (!fileInput?.files?.[0]) {
        alert('Please select a JSON file');
        return;
      }
      
      if (locations.length === 0) {
        alert('Please enter at least one target location');
        return;
      }
      
      try {
        // Read and parse the JSON file
        const fileContent = await fileInput.files[0].text();
        const importData = JSON.parse(fileContent);
        
        if (!importData?.properties || typeof importData.properties !== 'object') {
          alert('Invalid JSON file format: missing or invalid properties object');
          return;
        }
        
        // Validate all target locations are valid equipment (BEQU) using bulk SearchGQL
        const searchResult = await client.sendRequest('SearchGQL', {
          steps: [
            {
              includeRoots: true,
              leafFilter: {
                hasType: ['BEQU']
              }
            }
          ],
          roots: locations
        });
        
        if (searchResult?.status !== 200) {
          console.error('SearchGQL response:', searchResult);
          alert('Failed to validate target locations');
          return;
        }
        
        // Check for errors in the SearchGQL response
        if (searchResult.response?.errors && searchResult.response.errors.length > 0) {
          console.warn('SearchGQL returned errors:', searchResult.response.errors);
        }
        
        const targetDBIDs = searchResult.response?.dbids || [];
        
        if (targetDBIDs.length !== locations.length) {
          alert('One or more target locations are not valid equipment.');
          return;
        }
        
        // Build the set array from the properties
        const setArray = [];
        for (const key in importData.properties) {
          if (importData.properties.hasOwnProperty(key)) {
            setArray.push({
              expression: key,
              value: importData.properties[key]
            });
          }
        }
        
        if (setArray.length === 0) {
          alert('No properties to import');
          return;
        }
        
        // Execute the import using ExecGQL in batches of 500
        // Properties are applied to all target locations
        let successCount = 0;
        let errorCount = 0;
        const batchSize = 100;
        
        for (let i = 0; i < setArray.length; i += batchSize) {
          const batch = setArray.slice(i, i + batchSize);
          
          const execResult = await client.sendRequest('ExecGQL', {
            nodes: targetDBIDs,
            set: batch,
            fieldAccess: true
          });
          
          if (execResult?.status !== 200) {
            console.error('ExecGQL response:', execResult);
            alert('Failed to import properties (batch ' + Math.floor(i / batchSize + 1) + '). Check console for details.');
            return;
          }
          
          // Check for errors in the response
          if (execResult.response?.errors && execResult.response.errors.length > 0) {
            errorCount += execResult.response.errors.length;
            console.error('ExecGQL returned errors:', execResult.response.errors);
          }
          
          // Count successful operations
          if (execResult.response?.nodes) {
            successCount += execResult.response.nodes.length;
          }
        }
        
        if (errorCount > 0) {
          alert('Import completed with errors.\nSuccessful: ' + successCount + '\nFailed: ' + errorCount + '\nCheck console for details.');
        } else {
          alert('Import completed successfully!\n' + setArray.length + ' properties applied to ' + locations.length + ' location(s).');
        }
        
      } catch (error) {
        console.error('Import error:', error);
        alert('An error occurred during import: ' + (error?.message || error));
      }
    };

  })();
</script>
